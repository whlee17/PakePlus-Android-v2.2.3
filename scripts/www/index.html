=== 應用功能說明 ===
1. 地磚計算器
   - 支援矩形、L型、多區域三種房間形狀
   - 支援多種地磚尺寸：600×600、200×1200、800×800、600×1200、400×800、75×300、300×600、200×200、750×1500
   - 支援自定義箱數規格（2-8塊/箱，以及其他選項）
   - 支援損耗率設置（10%、15%）

2. 牆身鋪磚
   - 支援四面牆面總面積計算
   - 支援牆身地磚箱數規格設置
   - 支援損耗率設置

3. 輸出功能
   - 支援輸出報價單
   - 支援導出 Excel 表格
   - 支援分享功能
   - 支援下載詳情頁面為圖片
   - 支援導出 HTML 源代碼（用於備份和還原）

4. 開發者工具
   - 查看應用程式完整 HTML 源代碼
   - 導出 HTML 源代碼
   - 複製源代碼到剪貼板
   - 文件瀏覽器：樹狀目錄查看所有文件
   - 導出所有文件：將所有源代碼文件打包為 ZIP 格式下載
   - 文件內容預覽：查看預存的文件內容

=== 應用功能說明結束 ===
